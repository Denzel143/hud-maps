<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Navigation HUD</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

    <style>
        /* BASE LAYOUT */
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #000; overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Kontainer Utama untuk mempermudah rotasi CSS */
        #app {
            width: 100vw; height: 100vh;
            background-color: #000; color: #fff; font-family: Arial, sans-serif;
            display: flex; flex-direction: column;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.5s, width 0.5s, height 0.5s, background-color 0.3s, color 0.3s;
        }

        /* HUD MODE - Jika orientasi ponsel sudah Lanskap (hanya Mirror) */
        body.hud-mode #app {
            transform: translate(-50%, -50%) scaleX(-1);
        }

        /* HUD MODE - Jika orientasi ponsel Potret (Putar Layout ke Lanskap + Mirror) */
        @media (orientation: portrait) {
            body.hud-mode #app {
                width: 100vh;
                height: 100vw;
                transform: translate(-50%, -50%) rotate(90deg) scaleX(-1);
            }
        }

        /* TOP BAR: Pencarian & Tombol */
        #top-bar {
            display: flex; padding: 10px; gap: 10px; background: #111; z-index: 1000;
            transition: background-color 0.3s;
        }
        #search-wrapper { position: relative; flex-grow: 1; }
        #search-input {
            width: 100%; padding: 10px; box-sizing: border-box; background: #222; 
            border: 1px solid #444; color: #fff; border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        #search-results {
            position: absolute; top: 100%; left: 0; right: 0; background: #333;
            list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto; display: none;
        }
        #search-results li { padding: 10px; border-bottom: 1px solid #444; cursor: pointer; }
        
        button {
            padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer;
            font-weight: bold; background: #007bff; color: white;
        }
        #btn-start { background: #28a745; display: none; }
        #btn-cancel { background: #ffc107; color: black; display: none; }
        #btn-hud { background: #dc3545; }
        #btn-theme { background: #555; font-size: 16px; padding: 10px; } /* Tombol Tema */

        /* MAP CONTAINER */
        #map { flex-grow: 1; width: 100%; z-index: 1; }

        /* Sembunyikan UI Leaflet bawaan agar bersih */
        .leaflet-control-zoom, .leaflet-routing-container { display: none !important; }

        /* DASHBOARD BAWAH */
        #dashboard {
            height: 100px; background: #111; display: flex; 
            flex-direction: column; justify-content: center; padding: 5px 15px; z-index: 1000;
            transition: background-color 0.3s;
        }
        .dash-row-1 { display: flex; justify-content: space-between; align-items: center; font-size: 24px; font-weight: bold;}
        .dash-row-2 { font-size: 16px; color: #aaa; text-align: center; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .highlight { color: #00ff00; }
        
        /* Instruksi Navigasi (Tengah) */
        #instruction-container {
            display: flex; align-items: center; justify-content: center; flex-grow: 1; margin: 0 15px; overflow: hidden;
        }
        #val-turn-icon { font-size: 32px; color: #ffcc00; margin-right: 10px; }
        #val-instruction { font-size: 20px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #00ff00; }

        /* IKON KENDARAAN (Panah) */
        .car-icon {
            font-size: 24px; color: #00ff00; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            text-shadow: 0 0 5px #000; transition: transform 0.2s linear;
        }
        
        /* Ikon Manuver di Peta */
        .maneuver-map-icon {
            background: #222; border: 2px solid #ffcc00; color: #ffcc00; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-size: 14px; box-shadow: 0 0 5px #000;
        }

        /* --- LIGHT MODE STYLES --- */
        body.light-mode, body.light-mode #app { background-color: #f8f9fa; color: #212529; }
        body.light-mode #top-bar { background: #e9ecef; }
        body.light-mode #dashboard { background: #e9ecef; }
        body.light-mode #search-input { background: #ffffff; border: 1px solid #ced4da; color: #212529; }
        body.light-mode #search-results { background: #ffffff; color: #212529; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        body.light-mode #search-results li { border-bottom: 1px solid #e9ecef; }
        body.light-mode .dash-row-2 { color: #6c757d; }
        body.light-mode .highlight, 
        body.light-mode #val-instruction, 
        body.light-mode .car-icon, 
        body.light-mode #val-odometer { color: #0056b3; } /* Biru gelap pengganti hijau neon */
        body.light-mode #btn-theme { background: #adb5bd; color: #000; }
        body.light-mode .maneuver-map-icon { background: #fff; box-shadow: 0 0 5px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div id="app">
        <div id="top-bar">
            <div id="search-wrapper">
                <input type="text" id="search-input" placeholder="Cari lokasi tujuan..." autocomplete="off">
                <ul id="search-results"></ul>
            </div>
            <button id="btn-theme">☀️</button>
            <button id="btn-cancel">BATAL</button>
            <button id="btn-start">START</button>
            <button id="btn-hud">HUD</button>
        </div>

        <div id="map"></div>

        <div id="dashboard">
            <div class="dash-row-1">
                <div style="min-width: 80px;"><span id="val-speed" class="highlight">0</span> km/h</div>
                
                <div id="instruction-container">
                    <div id="val-turn-icon">📍</div>
                    <div id="val-instruction">Menunggu tujuan...</div>
                </div>

                <div id="val-clock" style="min-width: 60px; text-align: right;">00:00</div>
            </div>
            <div class="dash-row-2">
                <span id="val-odometer" style="color: #00ff00; font-weight: bold; margin-right: 15px;">ODO: 0.0 km</span>
                <span id="val-street">Posisi tidak diketahui</span>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>

    <script>
        // --- INISIALISASI VARIABEL ---
        let map, userMarker, destinationMarker, routingControl, traversedLine, tileLayer;
        let userLat = 0, userLng = 0, currentHeading = 0;
        let isNavigating = false;
        let wakeLock = null;
        let totalDistance = 0; 
        
        // Variabel untuk algoritma Rerouting & Warna Jalan
        let routeCoordinates = []; 
        let offRouteCount = 0; 

        // Variabel untuk Instruksi Navigasi & Voice
        let routeInstructions = [];
        let maneuverMarkers = [];
        let spokenInstructionIndex = -1;

        // Elemen DOM
        const elSpeed = document.getElementById('val-speed');
        const elClock = document.getElementById('val-clock');
        const elStreet = document.getElementById('val-street');
        const elInstruction = document.getElementById('val-instruction');
        const elTurnIcon = document.getElementById('val-turn-icon');
        const elOdometer = document.getElementById('val-odometer');
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');
        const btnStart = document.getElementById('btn-start');
        const btnCancel = document.getElementById('btn-cancel');
        const btnHud = document.getElementById('btn-hud');
        const btnTheme = document.getElementById('btn-theme');

        // --- SETUP PETA ---
        map = L.map('map', { zoomControl: false }).setView([-6.200000, 106.816666], 15);
        tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        traversedLine = L.polyline([], { color: '#666666', weight: 6, opacity: 1 }).addTo(map);

        const userIcon = L.divIcon({
            html: '<div id="arrow-icon" class="car-icon">▲</div>',
            className: '',
            iconSize: [30, 30],
            iconAnchor: [15, 15]
        });

        userMarker = L.marker([-6.200000, 106.816666], {icon: userIcon, zIndexOffset: 1000}).addTo(map);

        // --- HELPER: TEXT-TO-SPEECH ---
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'id-ID';
                utterance.rate = 1.0; 
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- HELPER: MENGUBAH MODIFIER OSRM MENJADI EMOJI PANAH ---
        function getDirectionEmoji(modifier, type) {
            if (!modifier) {
                if (type && type.includes('arrive')) return '🏁';
                return '⬆️';
            }
            const mod = modifier.toLowerCase();
            if (mod.includes('right')) return '➡️';
            if (mod.includes('left')) return '⬅️';
            if (mod.includes('uturn') || mod.includes('turnaround')) return '↩️';
            return '⬆️';
        }

        // --- UPDATE JAM LOKAL ---
        setInterval(() => {
            const now = new Date();
            elClock.innerText = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }, 1000);

        // --- GPS TRACKING (WATCH POSITION) ---
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const speed = pos.coords.speed ? (pos.coords.speed * 3.6).toFixed(0) : 0; 
                    const heading = pos.coords.heading;

                    if (userLat !== 0 && userLng !== 0) {
                        totalDistance += map.distance([userLat, userLng], [lat, lng]);
                        elOdometer.innerText = `ODO: ${(totalDistance / 1000).toFixed(1)} km`;
                    }

                    userLat = lat; userLng = lng;
                    userMarker.setLatLng([lat, lng]);
                    elSpeed.innerText = speed;

                    if (heading !== null && !isNaN(heading)) {
                        currentHeading = heading;
                        const arrow = document.getElementById('arrow-icon');
                        if (arrow) arrow.style.transform = `rotate(${heading}deg)`;
                    }

                    if (isNavigating) {
                        map.setView([lat, lng], 18);
                    } else if (!destinationMarker) {
                        map.setView([lat, lng], 15);
                    }

                    // --- ALGORITMA DETEKSI JALUR & INSTRUKSI NAVIGASI ---
                    if (routingControl && isNavigating && routeCoordinates.length > 0) {
                        let minDistance = Infinity;
                        let closestIndex = 0;
                        const currentPos = L.latLng(lat, lng);
                        
                        for(let i = 0; i < routeCoordinates.length; i++) {
                            const d = map.distance(currentPos, routeCoordinates[i]);
                            if(d < minDistance) {
                                minDistance = d;
                                closestIndex = i;
                            }
                        }

                        if (minDistance > 50) {
                            offRouteCount++;
                            if (offRouteCount >= 5) { 
                                elTurnIcon.innerText = "🔄";
                                elInstruction.innerText = "Menghitung ulang rute...";
                                offRouteCount = 0;
                                traversedLine.setLatLngs([]);
                                
                                routingControl.setWaypoints([
                                    L.latLng(lat, lng),
                                    destinationMarker.getLatLng()
                                ]);
                            }
                        } else {
                            offRouteCount = 0;

                            const passedPath = routeCoordinates.slice(0, closestIndex + 1);
                            traversedLine.setLatLngs(passedPath);
                            traversedLine.bringToFront(); 
                            userMarker.bringToFront(); 

                            // --- LOGIKA INSTRUKSI (HUD & VOICE) ---
                            let nextInstIndex = -1;
                            for (let i = 0; i < routeInstructions.length; i++) {
                                if (routeInstructions[i].index > closestIndex) {
                                    nextInstIndex = i;
                                    break;
                                }
                            }

                            if (nextInstIndex !== -1) {
                                const nextInst = routeInstructions[nextInstIndex];
                                const distToManeuver = map.distance(currentPos, routeCoordinates[nextInst.index]);
                                
                                elTurnIcon.innerText = getDirectionEmoji(nextInst.modifier, nextInst.type);
                                elInstruction.innerText = `${nextInst.text} (${Math.round(distToManeuver)}m)`;

                                if (distToManeuver < 100 && spokenInstructionIndex !== nextInstIndex) {
                                    speak(`Dalam ${Math.round(distToManeuver)} meter, ${nextInst.text}`);
                                    spokenInstructionIndex = nextInstIndex; 
                                }
                            } else {
                                elTurnIcon.innerText = "🏁";
                                elInstruction.innerText = "Tiba di tujuan";
                            }
                        }
                    }
                },
                (err) => console.error("GPS Error:", err),
                { enableHighAccuracy: true, maximumAge: 1000 }
            );
        }

        // --- PENCARIAN LOKASI (AUTOCOMPLETE) ---
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value;
            if (query.length < 3) { searchResults.style.display = 'none'; return; }

            searchTimeout = setTimeout(() => {
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&countrycodes=id&limit=5`)
                .then(res => res.json())
                .then(data => {
                    searchResults.innerHTML = '';
                    if(data.length > 0) {
                        data.forEach(item => {
                            const li = document.createElement('li');
                            li.innerText = item.display_name;
                            li.onclick = () => selectDestination(item.lat, item.lon, item.display_name);
                            searchResults.appendChild(li);
                        });
                        searchResults.style.display = 'block';
                    }
                });
            }, 500);
        });

        // --- MEMILIH TUJUAN ---
        function selectDestination(lat, lng, name) {
            searchResults.style.display = 'none';
            searchInput.value = name.split(',')[0]; 
            elStreet.innerText = "Tujuan: " + name;

            if (destinationMarker) map.removeLayer(destinationMarker);
            destinationMarker = L.marker([lat, lng]).addTo(map);

            if (routingControl) map.removeControl(routingControl);

            routingControl = L.Routing.control({
                waypoints: [ L.latLng(userLat, userLng), L.latLng(lat, lng) ],
                router: L.Routing.osrmv1({ language: 'id', profile: 'driving' }),
                lineOptions: { styles: [{ color: '#00aaff', opacity: 0.8, weight: 6 }] },
                createMarker: function() { return null; }, 
                addWaypoints: false, 
                routeWhileDragging: false,
                show: false 
            }).addTo(map);

            routingControl.on('routesfound', function(e) {
                const routes = e.routes;
                const summary = routes[0].summary;
                
                routeCoordinates = routes[0].coordinates;
                routeInstructions = routes[0].instructions;
                offRouteCount = 0; 
                spokenInstructionIndex = -1; 
                traversedLine.setLatLngs([]); 
                
                maneuverMarkers.forEach(m => map.removeLayer(m));
                maneuverMarkers = [];

                routeInstructions.forEach((inst, idx) => {
                    if (inst.index && inst.text && idx > 0) {
                        const coord = routeCoordinates[inst.index];
                        const iconSymbol = getDirectionEmoji(inst.modifier, inst.type);
                        
                        const mIcon = L.divIcon({
                            className: '',
                            html: `<div class="maneuver-map-icon" style="width: 24px; height: 24px;">${iconSymbol}</div>`,
                            iconSize: [28, 28],
                            iconAnchor: [14, 14]
                        });
                        const marker = L.marker(coord, {icon: mIcon}).addTo(map);
                        maneuverMarkers.push(marker);
                    }
                });
                
                if (!isNavigating) {
                    map.fitBounds(L.latLngBounds([userLat, userLng], [lat, lng]).pad(0.2));
                    btnStart.style.display = 'block'; 
                    elTurnIcon.innerText = "📍";
                    elInstruction.innerText = `Total Jarak: ${(summary.totalDistance / 1000).toFixed(1)} km`;
                }
                
                btnCancel.style.display = 'block';
            });
        }

        // --- TOMBOL TEMA (LIGHT/DARK MODE) ---
        btnTheme.addEventListener('click', () => {
            const body = document.body;
            body.classList.toggle('light-mode');
            
            if (body.classList.contains('light-mode')) {
                btnTheme.innerText = '🌙';
                tileLayer.setUrl('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png');
            } else {
                btnTheme.innerText = '☀️';
                tileLayer.setUrl('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
            }
        });

        // --- TOMBOL START (MULAI NAVIGASI) ---
        btnStart.addEventListener('click', () => {
            isNavigating = true;
            btnStart.style.display = 'none';
            searchInput.disabled = true; 
            
            map.setView([userLat, userLng], 18);
            map.dragging.disable();
            map.touchZoom.disable();
            map.doubleClickZoom.disable();
            map.scrollWheelZoom.disable();
            map.boxZoom.disable();
            map.keyboard.disable();

            elTurnIcon.innerText = "⬆️";
            elInstruction.innerText = "Mulai ikuti rute...";
            speak("Navigasi dimulai. Ikuti rute.");
        });

        // --- TOMBOL BATAL (MEMBATALKAN RUTE) ---
        btnCancel.addEventListener('click', () => {
            isNavigating = false;
            
            btnStart.style.display = 'none';
            btnCancel.style.display = 'none';
            
            searchInput.disabled = false;
            searchInput.value = '';
            
            elStreet.innerText = "Posisi tidak diketahui";
            elTurnIcon.innerText = "📍";
            elInstruction.innerText = "Menunggu tujuan...";

            routeCoordinates = [];
            routeInstructions = [];
            offRouteCount = 0;
            spokenInstructionIndex = -1;
            traversedLine.setLatLngs([]);
            
            maneuverMarkers.forEach(m => map.removeLayer(m));
            maneuverMarkers = [];

            if (routingControl) {
                map.removeControl(routingControl);
                routingControl = null;
            }
            if (destinationMarker) {
                map.removeLayer(destinationMarker);
                destinationMarker = null;
            }

            map.dragging.enable();
            map.touchZoom.enable();
            map.doubleClickZoom.enable();
            map.scrollWheelZoom.enable();
            map.boxZoom.enable();
            map.keyboard.enable();

            map.setView([userLat, userLng], 15);
        });

        // --- WAKE LOCK API ---
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { console.error(`${err.name}, ${err.message}`); }
        }

        // --- TOMBOL HUD (LANSKAP CSS & MIRROR) ---
        btnHud.addEventListener('click', async () => {
            const body = document.body;
            
            if (!document.fullscreenElement) {
                try {
                    await document.documentElement.requestFullscreen();
                } catch(err) { console.log("Fullscreen ditolak:", err); }
            } else {
                document.exitFullscreen();
            }

            if (!body.classList.contains('hud-mode')) {
                requestWakeLock();
            } else if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
            }

            body.classList.toggle('hud-mode');

            if (body.classList.contains('hud-mode')) {
                btnHud.innerText = "NORMAL";
                btnHud.style.background = "#6c757d";
            } else {
                btnHud.innerText = "HUD";
                btnHud.style.background = "#dc3545";
            }

            setTimeout(() => { map.invalidateSize(); }, 500);
        });

        window.addEventListener('resize', () => {
            setTimeout(() => { map.invalidateSize(); }, 500);
        });
    </script>
</body>
</html>
