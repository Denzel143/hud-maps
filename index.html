<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Navigation HUD</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

    <style>
        /* BASE LAYOUT */
        body, html {
            margin: 0; padding: 0; 
            width: 100vw; height: 100dvh; /* 100dvh mengatasi layar terpotong di mobile */
            background-color: #000; overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
            font-family: Arial, sans-serif; color: #fff;
        }

        /* --- MODE NORMAL (DEFAULT) MENGGUNAKAN CSS GRID --- */
        #app {
            display: grid;
            width: 100vw; height: 100dvh;
            grid-template-columns: 1fr auto auto;
            grid-template-rows: auto 1fr auto auto;
            grid-template-areas:
                "search controls start"
                "map map map"
                "speed nav clock"
                "odo dest dest";
            background-color: #000;
            transition: transform 0.5s;
        }

        /* TOP BAR AREA */
        #box-search { grid-area: search; padding: 10px; background: #111; position: relative; }
        #search-input {
            width: 100%; padding: 10px; box-sizing: border-box; background: #222; 
            border: 1px solid #444; color: #fff; border-radius: 5px; transition: 0.3s;
        }
        #search-results {
            position: absolute; top: 100%; left: 0; right: 0; background: #333; z-index: 2000;
            list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto; display: none;
        }
        #search-results li { padding: 10px; border-bottom: 1px solid #444; cursor: pointer; }
        
        #box-controls { grid-area: controls; padding: 10px; background: #111; display: flex; gap: 5px; align-items: center; }
        #box-start { grid-area: start; padding: 10px; background: #111; display: none; align-items: center; }
        
        button {
            padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer;
            font-weight: bold; background: #007bff; color: white;
        }
        #btn-theme { background: #555; padding: 10px; font-size: 16px; }
        #btn-cancel { background: #ffc107; color: black; display: none; }
        #btn-start { background: #28a745; width: 100%; height: 100%; }
        #btn-hud { background: #dc3545; }

        /* MAP AREA */
        #box-map { grid-area: map; position: relative; width: 100%; height: 100%; z-index: 1; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; }
        .leaflet-control-zoom, .leaflet-routing-container { display: none !important; }

        /* DASHBOARD AREA */
        #box-speed, #box-nav, #box-clock, #box-odo, #box-dest { background: #111; }
        
        #box-speed { grid-area: speed; padding: 10px 0 5px 15px; font-size: 24px; font-weight: bold; display: flex; align-items: center; white-space: nowrap; }
        .highlight { color: #00ff00; }
        
        #box-nav { grid-area: nav; padding: 10px 5px 5px 5px; display: flex; align-items: center; justify-content: center; overflow: hidden; white-space: nowrap; }
        #val-turn-icon { font-size: 30px; color: #ffcc00; margin-right: 8px; }
        #val-instruction { font-size: 20px; color: #00ff00; text-overflow: ellipsis; overflow: hidden; }
        
        #box-clock { grid-area: clock; padding: 10px 15px 5px 0; font-size: 24px; font-weight: bold; text-align: right; display: flex; align-items: center; justify-content: flex-end; }
        
        #box-odo { grid-area: odo; padding: 0 0 10px 15px; color: #00ff00; font-weight: bold; display: flex; align-items: center; white-space: nowrap; }
        
        #box-dest { grid-area: dest; padding: 0 15px 10px 0; text-align: right; color: #aaa; overflow: hidden; white-space: nowrap; display: flex; flex-direction: column; justify-content: center; }
        #val-street { text-overflow: ellipsis; overflow: hidden; font-size: 16px; }
        #val-eta-dist { font-size: 14px; color: #ffcc00; margin-top: 3px; font-weight: bold; display: none; }

        /* IKON KENDARAAN (Panah) & MANUVER PETA */
        .car-icon { font-size: 24px; color: #00ff00; font-weight: bold; display: flex; justify-content: center; align-items: center; text-shadow: 0 0 5px #000; transition: transform 0.2s linear; }
        .maneuver-map-icon { background: #222; border: 2px solid #ffcc00; color: #ffcc00; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 0 5px #000; }

        /* --- MODE HUD (SPLIT SCREEN L/R) --- */
        body.hud-mode #app {
            grid-template-columns: 25vw 25vw 50vw; /* Kiri dibagi 2, Kanan ambil setengah */
            grid-template-rows: 70px 1fr 100px 70px; /* Alokasi Baris Tepat Tanpa Scroll */
            grid-template-areas:
                "speed    speed    search"
                "speed    speed    map"
                "clock    nav      map"
                "controls controls dest";
            background-color: #000;
        }

        /* HUD - Rotasi & Mirror untuk Kaca Mobil */
        body.hud-mode { transform: scaleX(-1); }
        @media (orientation: portrait) {
            body.hud-mode #app {
                width: 100dvh; height: 100vw;
                transform: translate(calc(50vw - 50dvh), calc(50dvh - 50vw)) rotate(90deg);
            }
        }

        /* HUD - Kiri Atas: Speed */
        body.hud-mode #box-speed { 
            grid-area: speed; background: #000; flex-direction: column; 
            justify-content: center; align-items: center; padding: 0;
        }
        body.hud-mode #val-speed { font-size: 140px; line-height: 1; }
        body.hud-mode .unit { font-size: 30px; color: #aaa; }

        /* HUD - Kiri Bawah: Jam & Navigasi */
        body.hud-mode #box-clock { grid-area: clock; background: #000; font-size: 35px; justify-content: center; padding: 10px; }
        body.hud-mode #box-nav { grid-area: nav; background: #000; flex-direction: column; justify-content: center; padding: 10px; }
        body.hud-mode #val-turn-icon { font-size: 50px; margin: 0; }
        body.hud-mode #val-instruction { font-size: 22px; text-align: center; white-space: normal; line-height: 1.2; }

        /* HUD - Kiri Paling Bawah: Tombol */
        body.hud-mode #box-controls { grid-area: controls; background: #111; justify-content: space-around; padding: 10px; border-top: 2px solid #222; }

        /* HUD - Kanan Atas: Search & Start */
        body.hud-mode #box-search { grid-area: search; background: #000; display: flex; align-items: center; }
        body.hud-mode #box-start { position: absolute; top: 15px; right: 15px; z-index: 1000; padding: 0; background: transparent; }

        /* HUD - Kanan Tengah: Map */
        body.hud-mode #box-map { border-left: 2px solid #333; }

        /* HUD - Kanan Bawah: Destinasi, Jarak, ETA */
        body.hud-mode #box-dest { grid-area: dest; background: #111; border-top: 2px solid #222; border-left: 2px solid #333; text-align: center; padding: 10px; align-items: center; justify-content: center; }
        body.hud-mode #val-street { font-size: 18px; color: #fff; }
        body.hud-mode #val-eta-dist { font-size: 18px; display: block; }
        
        /* Hilangkan ODO di Mode HUD agar rapi */
        body.hud-mode #box-odo { display: none; }

        /* --- LIGHT MODE STYLES --- */
        body.light-mode { background-color: #f8f9fa; color: #212529; }
        body.light-mode #app { background-color: #f8f9fa; }
        body.light-mode #box-search, body.light-mode #box-controls, 
        body.light-mode #box-speed, body.light-mode #box-nav, 
        body.light-mode #box-clock, body.light-mode #box-odo, body.light-mode #box-dest { background: #e9ecef; }
        
        body.light-mode #search-input { background: #ffffff; border: 1px solid #ced4da; color: #212529; }
        body.light-mode #search-results { background: #ffffff; color: #212529; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        body.light-mode .highlight, body.light-mode #val-instruction, 
        body.light-mode .car-icon, body.light-mode #box-odo { color: #0056b3; } /* Biru gelap pengganti hijau neon */
        body.light-mode #btn-theme { background: #adb5bd; color: #000; }
        body.light-mode #val-street { color: #495057; }
        
        /* Pengecualian: Mode HUD selalu dominan gelap untuk kaca mobil, Light Mode dinonaktifkan secara paksa saat HUD via JS */
    </style>
</head>
<body>

    <div id="app">
        <div id="box-search">
            <input type="text" id="search-input" placeholder="Cari lokasi tujuan..." autocomplete="off">
            <ul id="search-results"></ul>
        </div>
        
        <div id="box-start">
            <button id="btn-start">START</button>
        </div>

        <div id="box-controls">
            <button id="btn-theme">☀️</button>
            <button id="btn-cancel">BATAL</button>
            <button id="btn-hud">HUD</button>
        </div>

        <div id="box-map"><div id="map"></div></div>

        <div id="box-speed"><span id="val-speed" class="highlight">0</span>&nbsp;<span class="unit">km/h</span></div>
        
        <div id="box-nav">
            <span id="val-turn-icon">📍</span>
            <span id="val-instruction" class="highlight">Menunggu tujuan...</span>
        </div>

        <div id="box-clock"><span id="val-clock">00:00</span></div>

        <div id="box-odo"><span id="val-odometer">ODO: 0.0 km</span></div>
        
        <div id="box-dest">
            <div id="val-street">Posisi tidak diketahui</div>
            <div id="val-eta-dist">Jarak: - | ETA: -</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>

    <script>
        // --- INISIALISASI VARIABEL ---
        let map, userMarker, destinationMarker, routingControl, traversedLine, tileLayer;
        let userLat = 0, userLng = 0, currentHeading = 0;
        let isNavigating = false;
        let wakeLock = null;
        let totalDistance = 0; 
        
        let routeCoordinates = []; 
        let offRouteCount = 0; 

        let routeInstructions = [];
        let maneuverMarkers = [];
        let spokenInstructionIndex = -1;
        let routePace = 0; // Detik per meter (untuk hitung ETA)

        // Elemen DOM
        const elSpeed = document.getElementById('val-speed');
        const elClock = document.getElementById('val-clock');
        const elStreet = document.getElementById('val-street');
        const elInstruction = document.getElementById('val-instruction');
        const elTurnIcon = document.getElementById('val-turn-icon');
        const elOdometer = document.getElementById('val-odometer');
        const elEtaDist = document.getElementById('val-eta-dist');
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');
        
        const btnStart = document.getElementById('btn-start');
        const boxStart = document.getElementById('box-start'); // Wrapper container
        const btnCancel = document.getElementById('btn-cancel');
        const btnHud = document.getElementById('btn-hud');
        const btnTheme = document.getElementById('btn-theme');

        // --- SETUP PETA ---
        map = L.map('map', { zoomControl: false }).setView([-6.200000, 106.816666], 15);
        tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        traversedLine = L.polyline([], { color: '#666666', weight: 6, opacity: 1 }).addTo(map);

        const userIcon = L.divIcon({
            html: '<div id="arrow-icon" class="car-icon">▲</div>',
            className: '', iconSize: [30, 30], iconAnchor: [15, 15]
        });

        userMarker = L.marker([-6.200000, 106.816666], {icon: userIcon, zIndexOffset: 1000}).addTo(map);

        // --- HELPER: TEXT-TO-SPEECH ---
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'id-ID';
                utterance.rate = 1.0; 
                window.speechSynthesis.speak(utterance);
            }
        }

        function getDirectionEmoji(modifier, type) {
            if (!modifier) {
                if (type && type.includes('arrive')) return '🏁';
                return '⬆️';
            }
            const mod = modifier.toLowerCase();
            if (mod.includes('right')) return '➡️';
            if (mod.includes('left')) return '⬅️';
            if (mod.includes('uturn') || mod.includes('turnaround')) return '↩️';
            return '⬆️';
        }

        // --- UPDATE JAM LOKAL ---
        setInterval(() => {
            const now = new Date();
            elClock.innerText = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }, 1000);

        // --- GPS TRACKING ---
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const speed = pos.coords.speed ? (pos.coords.speed * 3.6).toFixed(0) : 0; 
                    const heading = pos.coords.heading;

                    if (userLat !== 0 && userLng !== 0) {
                        totalDistance += map.distance([userLat, userLng], [lat, lng]);
                        elOdometer.innerText = `ODO: ${(totalDistance / 1000).toFixed(1)} km`;
                    }

                    userLat = lat; userLng = lng;
                    userMarker.setLatLng([lat, lng]);
                    elSpeed.innerText = speed;

                    if (heading !== null && !isNaN(heading)) {
                        currentHeading = heading;
                        const arrow = document.getElementById('arrow-icon');
                        if (arrow) arrow.style.transform = `rotate(${heading}deg)`;
                    }

                    if (isNavigating) {
                        map.setView([lat, lng], 18);
                    } else if (!destinationMarker) {
                        map.setView([lat, lng], 15);
                    }

                    // --- ALGORITMA NAVIGASI & ETA ---
                    if (routingControl && isNavigating && routeCoordinates.length > 0) {
                        let minDistance = Infinity;
                        let closestIndex = 0;
                        const currentPos = L.latLng(lat, lng);
                        
                        for(let i = 0; i < routeCoordinates.length; i++) {
                            const d = map.distance(currentPos, routeCoordinates[i]);
                            if(d < minDistance) {
                                minDistance = d;
                                closestIndex = i;
                            }
                        }

                        if (minDistance > 50) {
                            offRouteCount++;
                            if (offRouteCount >= 5) { 
                                elTurnIcon.innerText = "🔄";
                                elInstruction.innerText = "Menghitung ulang rute...";
                                offRouteCount = -20; // Kasih delay biar nggak spam
                                traversedLine.setLatLngs([]);
                                
                                routingControl.setWaypoints([
                                    L.latLng(lat, lng),
                                    destinationMarker.getLatLng()
                                ]);
                            }
                        } else {
                            if(offRouteCount < 0) offRouteCount = 0; // Reset normal jika balik jalur

                            const passedPath = routeCoordinates.slice(0, closestIndex + 1);
                            traversedLine.setLatLngs(passedPath);
                            traversedLine.bringToFront(); 
                            userMarker.bringToFront(); 

                            // Hitung Sisa Jarak & ETA
                            let remDist = 0;
                            for(let i = closestIndex; i < routeCoordinates.length - 1; i++) {
                                remDist += routeCoordinates[i].distanceTo(routeCoordinates[i+1]);
                            }
                            let remTimeSec = remDist * routePace;
                            let etaDate = new Date(Date.now() + remTimeSec * 1000);
                            let etaStr = etaDate.getHours().toString().padStart(2, '0') + ':' + etaDate.getMinutes().toString().padStart(2, '0');
                            
                            elEtaDist.innerText = `Sisa: ${(remDist/1000).toFixed(1)} km | ETA: ${etaStr}`;

                            // Update Instruksi & Voice
                            let nextInstIndex = -1;
                            for (let i = 0; i < routeInstructions.length; i++) {
                                if (routeInstructions[i].index > closestIndex) {
                                    nextInstIndex = i;
                                    break;
                                }
                            }

                            if (nextInstIndex !== -1) {
                                const nextInst = routeInstructions[nextInstIndex];
                                const distToManeuver = map.distance(currentPos, routeCoordinates[nextInst.index]);
                                
                                elTurnIcon.innerText = getDirectionEmoji(nextInst.modifier, nextInst.type);
                                elInstruction.innerText = `${nextInst.text} (${Math.round(distToManeuver)}m)`;

                                // Voice Trigger diperlebar ke 150m agar tidak mudah batal
                                if (distToManeuver < 150 && spokenInstructionIndex !== nextInstIndex && nextInst.text) {
                                    speak(`Dalam ${Math.round(distToManeuver)} meter, ${nextInst.text}`);
                                    spokenInstructionIndex = nextInstIndex; 
                                }
                            } else {
                                elTurnIcon.innerText = "🏁";
                                elInstruction.innerText = "Tiba di tujuan";
                            }
                        }
                    }
                },
                (err) => console.error("GPS Error:", err),
                { enableHighAccuracy: true, maximumAge: 1000 }
            );
        }

        // --- PENCARIAN LOKASI ---
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value;
            if (query.length < 3) { searchResults.style.display = 'none'; return; }

            searchTimeout = setTimeout(() => {
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&countrycodes=id&limit=5`)
                .then(res => res.json())
                .then(data => {
                    searchResults.innerHTML = '';
                    if(data.length > 0) {
                        data.forEach(item => {
                            const li = document.createElement('li');
                            li.innerText = item.display_name;
                            li.onclick = () => selectDestination(item.lat, item.lon, item.display_name);
                            searchResults.appendChild(li);
                        });
                        searchResults.style.display = 'block';
                    }
                });
            }, 500);
        });

        function selectDestination(lat, lng, name) {
            searchResults.style.display = 'none';
            searchInput.value = name.split(',')[0]; 
            elStreet.innerText = name; // Teks tujuan
            elEtaDist.style.display = 'block';

            if (destinationMarker) map.removeLayer(destinationMarker);
            destinationMarker = L.marker([lat, lng]).addTo(map);

            if (routingControl) map.removeControl(routingControl);

            routingControl = L.Routing.control({
                waypoints: [ L.latLng(userLat, userLng), L.latLng(lat, lng) ],
                router: L.Routing.osrmv1({ language: 'id', profile: 'driving' }),
                lineOptions: { styles: [{ color: '#00aaff', opacity: 0.8, weight: 6 }] },
                createMarker: function() { return null; }, 
                addWaypoints: false, 
                routeWhileDragging: false,
                show: false 
            }).addTo(map);

            routingControl.on('routesfound', function(e) {
                const routes = e.routes;
                const summary = routes[0].summary;
                
                routeCoordinates = routes[0].coordinates;
                routeInstructions = routes[0].instructions;
                routePace = summary.totalTime / summary.totalDistance; // Kalkulasi dasar ETA
                
                offRouteCount = 0; 
                traversedLine.setLatLngs([]); 
                
                maneuverMarkers.forEach(m => map.removeLayer(m));
                maneuverMarkers = [];

                routeInstructions.forEach((inst, idx) => {
                    if (inst.index && inst.text && idx > 0) {
                        const coord = routeCoordinates[inst.index];
                        const iconSymbol = getDirectionEmoji(inst.modifier, inst.type);
                        const mIcon = L.divIcon({
                            className: '', html: `<div class="maneuver-map-icon" style="width: 24px; height: 24px;">${iconSymbol}</div>`,
                            iconSize: [28, 28], iconAnchor: [14, 14]
                        });
                        const marker = L.marker(coord, {icon: mIcon}).addTo(map);
                        maneuverMarkers.push(marker);
                    }
                });
                
                // PERBAIKAN: Langsung perbarui instruksi saat Rerouting selesai
                if (isNavigating) {
                    spokenInstructionIndex = -1; // Reset memory voice agar dibaca lagi
                    const nextInst = routeInstructions.find(inst => inst.distance > 0 && inst.text);
                    if (nextInst) {
                        elTurnIcon.innerText = getDirectionEmoji(nextInst.modifier, nextInst.type);
                        elInstruction.innerText = nextInst.text;
                    }
                } else {
                    map.fitBounds(L.latLngBounds([userLat, userLng], [lat, lng]).pad(0.2));
                    boxStart.style.display = 'flex'; 
                    elTurnIcon.innerText = "📍";
                    elInstruction.innerText = `Total Jarak: ${(summary.totalDistance / 1000).toFixed(1)} km`;
                    elEtaDist.innerText = `Estimasi Perjalanan: ${Math.round(summary.totalTime / 60)} menit`;
                }
                
                btnCancel.style.display = 'block';
            });
        }

        // --- TOMBOL TEMA (LIGHT/DARK) ---
        btnTheme.addEventListener('click', () => {
            const body = document.body;
            body.classList.toggle('light-mode');
            
            if (body.classList.contains('light-mode')) {
                btnTheme.innerText = '🌙';
                tileLayer.setUrl('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png');
            } else {
                btnTheme.innerText = '☀️';
                tileLayer.setUrl('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
            }
        });

        // --- TOMBOL START ---
        btnStart.addEventListener('click', () => {
            isNavigating = true;
            boxStart.style.display = 'none';
            searchInput.disabled = true; 
            
            map.setView([userLat, userLng], 18);
            map.dragging.disable(); map.touchZoom.disable(); map.doubleClickZoom.disable();
            map.scrollWheelZoom.disable(); map.boxZoom.disable(); map.keyboard.disable();

            speak("Navigasi dimulai. Ikuti rute.");
            // Teks akan segera ditimpa oleh block watchPosition
        });

        // --- TOMBOL BATAL ---
        btnCancel.addEventListener('click', () => {
            isNavigating = false;
            boxStart.style.display = 'none';
            btnCancel.style.display = 'none';
            
            searchInput.disabled = false; searchInput.value = '';
            
            elStreet.innerText = "Posisi tidak diketahui";
            elEtaDist.style.display = 'none';
            elTurnIcon.innerText = "📍";
            elInstruction.innerText = "Menunggu tujuan...";

            routeCoordinates = []; routeInstructions = [];
            offRouteCount = 0; spokenInstructionIndex = -1;
            traversedLine.setLatLngs([]);
            maneuverMarkers.forEach(m => map.removeLayer(m));
            maneuverMarkers = [];

            if (routingControl) { map.removeControl(routingControl); routingControl = null; }
            if (destinationMarker) { map.removeLayer(destinationMarker); destinationMarker = null; }

            map.dragging.enable(); map.touchZoom.enable(); map.doubleClickZoom.enable();
            map.scrollWheelZoom.enable(); map.boxZoom.enable(); map.keyboard.enable();

            map.setView([userLat, userLng], 15);
        });

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); }
            catch (err) { console.error(err); }
        }

        // --- TOMBOL HUD ---
        btnHud.addEventListener('click', async () => {
            const body = document.body;
            
            if (!document.fullscreenElement) {
                try { await document.documentElement.requestFullscreen(); } catch(err) {}
            } else { document.exitFullscreen(); }

            if (!body.classList.contains('hud-mode')) {
                requestWakeLock();
                // Paksa matikan Light Mode karena HUD butuh kontras layar gelap di kaca mobil
                if(body.classList.contains('light-mode')) btnTheme.click(); 
                btnTheme.style.display = 'none'; // Sembunyikan tombol tema di HUD
            } else {
                if (wakeLock !== null) { wakeLock.release(); wakeLock = null; }
                btnTheme.style.display = 'block';
            }

            body.classList.toggle('hud-mode');

            if (body.classList.contains('hud-mode')) {
                btnHud.innerText = "NORMAL"; btnHud.style.background = "#6c757d";
            } else {
                btnHud.innerText = "HUD"; btnHud.style.background = "#dc3545";
            }

            setTimeout(() => { map.invalidateSize(); }, 500);
        });

        window.addEventListener('resize', () => { setTimeout(() => { map.invalidateSize(); }, 500); });
    </script>
</body>
</html>
