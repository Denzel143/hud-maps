<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Navigation HUD</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

    <style>
        /* BASE LAYOUT */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100dvh;
            background-color: #000; overflow: hidden; /* Mencegah scroll dan terpotong */
            transition: background-color 0.3s, color 0.3s;
            font-family: Arial, sans-serif; color: #fff;
        }

        /* --- MODE NORMAL --- */
        #app {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100dvh;
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto 1fr auto;
            grid-template-areas:
                "top"
                "map"
                "dash";
            transition: all 0.5s ease;
        }

        #top-bar {
            grid-area: top;
            display: flex; padding: 10px; gap: 10px; background: #111; z-index: 1000;
        }
        #search-wrapper { position: relative; flex-grow: 1; }
        #search-input {
            width: 100%; padding: 10px; box-sizing: border-box; background: #222; 
            border: 1px solid #444; color: #fff; border-radius: 5px;
        }
        #search-results {
            position: absolute; top: 100%; left: 0; right: 0; background: #333;
            list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto; display: none; z-index: 2000;
        }
        #search-results li { padding: 10px; border-bottom: 1px solid #444; cursor: pointer; }
        
        #btn-group { display: flex; gap: 5px; }
        button {
            padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer;
            font-weight: bold; background: #007bff; color: white; white-space: nowrap;
        }
        #btn-start { background: #28a745; display: none; }
        #btn-cancel { background: #ffc107; color: black; display: none; }
        #btn-hud { background: #dc3545; }
        #btn-theme { background: #555; padding: 10px; font-size: 16px; }

        #map-container { grid-area: map; position: relative; width: 100%; height: 100%; z-index: 1; }
        #map { width: 100%; height: 100%; }
        .leaflet-control-zoom, .leaflet-routing-container { display: none !important; }

        #dashboard {
            grid-area: dash; background: #111; z-index: 1000;
            padding: 10px 15px; 
            display: grid; 
            grid-template-columns: auto 1fr auto;
            grid-template-rows: auto auto;
            align-items: center; gap: 5px 15px;
        }
        #dash-speed { grid-column: 1; grid-row: 1; font-size: 24px; font-weight: bold; white-space: nowrap; }
        #instruction-container { grid-column: 2; grid-row: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #val-turn-icon { font-size: 32px; color: #ffcc00; margin-right: 10px; flex-shrink: 0; }
        #val-instruction { font-size: 20px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #00ff00; }
        #dash-clock { grid-column: 3; grid-row: 1; font-size: 24px; font-weight: bold; text-align: right; }
        
        #dash-info { 
            grid-column: 1 / 4; grid-row: 2; display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 15px; font-size: 14px; color: #aaa; text-align: center;
        }
        .highlight { color: #00ff00; }

        /* IKON PETA */
        .car-icon { font-size: 24px; color: #00ff00; font-weight: bold; display: flex; justify-content: center; align-items: center; text-shadow: 0 0 5px #000; transition: transform 0.2s linear; }
        .maneuver-map-icon { background: #222; border: 2px solid #ffcc00; color: #ffcc00; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 0 5px #000; }

        /* --- LIGHT MODE --- */
        body.light-mode { background-color: #f8f9fa; color: #212529; }
        body.light-mode #top-bar, body.light-mode #dashboard { background: #e9ecef; }
        body.light-mode #search-input { background: #ffffff; border: 1px solid #ced4da; color: #212529; }
        body.light-mode #search-results { background: #ffffff; color: #212529; }
        body.light-mode #search-results li { border-bottom: 1px solid #e9ecef; }
        body.light-mode .highlight, body.light-mode #val-instruction, body.light-mode .car-icon { color: #0056b3; }
        body.light-mode #btn-theme { background: #adb5bd; color: #000; }
        body.light-mode .maneuver-map-icon { background: #fff; box-shadow: 0 0 5px rgba(0,0,0,0.3); }

        /* --- HUD MODE CSS GRID --- */
        @media (orientation: portrait) {
            body.hud-mode #app {
                width: 100dvh; height: 100vw;
                position: absolute; top: 50%; left: 50%;
                transform: translate(-50%, -50%) rotate(90deg) scaleX(-1);
            }
        }
        @media (orientation: landscape) {
            body.hud-mode #app {
                width: 100vw; height: 100dvh;
                position: absolute; top: 50%; left: 50%;
                transform: translate(-50%, -50%) scaleX(-1);
            }
        }

        body.hud-mode #app {
            grid-template-columns: 50% 50%;
            grid-template-rows: auto 1fr auto auto;
            grid-template-areas:
                "speed search"
                "nav   map"
                "clock map"
                "btns  info";
            padding: 15px; gap: 10px 20px; background: #000; box-sizing: border-box;
        }

        /* Unbox container agar child bisa masuk grid utama */
        body.hud-mode #top-bar { display: contents; }
        body.hud-mode #dashboard { display: contents; }

        /* Kiri: Kecepatan */
        body.hud-mode #dash-speed { 
            grid-area: speed; align-self: start;
            font-size: 100px; text-align: left; 
            display: flex; align-items: baseline; justify-content: flex-start;
        }
        body.hud-mode #dash-speed .highlight { font-size: 120px; line-height: 0.8; }
        body.hud-mode #dash-speed .unit { font-size: 32px; margin-left: 10px; }

        /* Kiri: Navigasi & Panah */
        body.hud-mode #instruction-container { 
            grid-area: nav; 
            display: flex; flex-direction: row; align-items: flex-start; justify-content: flex-start; 
            padding-top: 20px; overflow: visible;
        }
        body.hud-mode #val-turn-icon { font-size: 70px; margin-right: 20px; margin-bottom: 0; line-height: 1;}
        body.hud-mode #val-instruction { font-size: 36px; white-space: normal; text-align: left; }
        
        /* Kiri: Jam */
        body.hud-mode #dash-clock { 
            grid-area: clock; align-self: end; justify-self: start; 
            font-size: 40px; margin-bottom: 10px; 
        }

        /* Kiri Bawah: Tombol */
        body.hud-mode #btn-group { 
            grid-area: btns; align-self: end; justify-content: flex-start; gap: 10px;
        }

        /* Kanan: Search */
        body.hud-mode #search-wrapper { grid-area: search; width: 100%; align-self: start; margin-bottom: 10px; }
        
        /* Kanan: Peta */
        body.hud-mode #map-container { 
            grid-area: map; width: 100%; height: 100%; min-height: 150px;
            border: 2px solid #444; border-radius: 10px; overflow: hidden; margin-bottom: 10px;
        }
        
        /* Kanan Bawah: Info Tujuan, Sisa, ETA */
        body.hud-mode #dash-info { 
            grid-area: info; 
            display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-end; 
            font-size: 20px; text-align: left; gap: 5px; color: #ddd; padding-bottom: 5px;
        }
        body.hud-mode #val-street { font-weight: bold; color: #fff; font-size: 22px; }
        body.hud-mode #dash-info span { display: block; width: 100%; }
    </style>
</head>
<body>

    <div id="app">
        <div id="top-bar">
            <div id="search-wrapper">
                <input type="text" id="search-input" placeholder="Cari lokasi tujuan..." autocomplete="off">
                <ul id="search-results"></ul>
            </div>
            <div id="btn-group">
                <button id="btn-theme">☀️</button>
                <button id="btn-cancel">BATAL</button>
                <button id="btn-start">START</button>
                <button id="btn-hud">HUD</button>
            </div>
        </div>

        <div id="map-container">
            <div id="map"></div>
        </div>

        <div id="dashboard">
            <div id="dash-speed">
                <span id="val-speed" class="highlight">0</span> <span class="unit">km/h</span>
            </div>
            
            <div id="instruction-container">
                <div id="val-turn-icon">📍</div>
                <div id="val-instruction">Menunggu tujuan...</div>
            </div>

            <div id="dash-clock">
                <span id="val-clock">00:00</span>
            </div>

            <div id="dash-info">
                <span id="val-odometer">ODO: 0.0 km</span>
                <span id="val-rem-dist" style="display:none; color: #ffcc00;">Sisa: -</span>
                <span id="val-eta" style="display:none; color: #00aaff;">ETA: -</span>
                <span id="val-street">Posisi tidak diketahui</span>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>

    <script>
        // --- INISIALISASI VARIABEL ---
        let map, userMarker, destinationMarker, routingControl, traversedLine, tileLayer;
        let userLat = 0, userLng = 0, currentHeading = 0;
        let isNavigating = false;
        let isRecalculating = false; // Flag untuk bug stuck teks
        let wakeLock = null;
        let totalDistance = 0; 
        
        let routeCoordinates = []; 
        let offRouteCount = 0; 

        let routeInstructions = [];
        let maneuverMarkers = [];
        let spokenInstructionIndex = -1; // Flag pencegah suara double/stuck

        // Elemen DOM
        const elSpeed = document.getElementById('val-speed');
        const elClock = document.getElementById('val-clock');
        const elStreet = document.getElementById('val-street');
        const elInstruction = document.getElementById('val-instruction');
        const elTurnIcon = document.getElementById('val-turn-icon');
        const elOdometer = document.getElementById('val-odometer');
        const elRemDist = document.getElementById('val-rem-dist');
        const elEta = document.getElementById('val-eta');
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');
        const btnStart = document.getElementById('btn-start');
        const btnCancel = document.getElementById('btn-cancel');
        const btnHud = document.getElementById('btn-hud');
        const btnTheme = document.getElementById('btn-theme');

        // --- SETUP PETA (Perbaikan URL HTTP) ---
        map = L.map('map', { zoomControl: false }).setView([-6.200000, 106.816666], 15);
        
        // Gunakan http biasa (bukan https) agar peta tetap muncul
        tileLayer = L.tileLayer('http://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);

        // Paksa render ulang ukuran map setelah 1 detik
        setTimeout(() => {
            map.invalidateSize();
        }, 1000);

        traversedLine = L.polyline([], { color: '#666666', weight: 6, opacity: 1 }).addTo(map);

        const userIcon = L.divIcon({
            html: '<div id="arrow-icon" class="car-icon">▲</div>',
            className: '',
            iconSize: [30, 30],
            iconAnchor: [15, 15]
        });

        userMarker = L.marker([-6.200000, 106.816666], {icon: userIcon, zIndexOffset: 1000}).addTo(map);

        // --- HELPER: TEXT-TO-SPEECH ---
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'id-ID';
                utterance.rate = 1.0; 
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- HELPER: MODIFIER OSRM -> EMOJI ---
        function getDirectionEmoji(modifier, type) {
            if (!modifier) {
                if (type && type.includes('arrive')) return '🏁';
                return '⬆️';
            }
            const mod = modifier.toLowerCase();
            if (mod.includes('right')) return '➡️';
            if (mod.includes('left')) return '⬅️';
            if (mod.includes('uturn') || mod.includes('turnaround')) return '↩️';
            return '⬆️';
        }

        // --- UPDATE JAM LOKAL ---
        setInterval(() => {
            const now = new Date();
            elClock.innerText = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }, 1000);

        // --- GPS TRACKING ---
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const speedKmh = pos.coords.speed ? (pos.coords.speed * 3.6).toFixed(0) : 0; 
                    const speedMps = pos.coords.speed || 8.33; // Default 30km/h jika null
                    const heading = pos.coords.heading;

                    if (userLat !== 0 && userLng !== 0) {
                        totalDistance += map.distance([userLat, userLng], [lat, lng]);
                        elOdometer.innerText = `ODO: ${(totalDistance / 1000).toFixed(1)} km`;
                    }

                    userLat = lat; userLng = lng;
                    userMarker.setLatLng([lat, lng]);
                    elSpeed.innerText = speedKmh;

                    if (heading !== null && !isNaN(heading)) {
                        currentHeading = heading;
                        const arrow = document.getElementById('arrow-icon');
                        if (arrow) arrow.style.transform = `rotate(${heading}deg)`;
                    }

                    if (isNavigating) {
                        map.setView([lat, lng], 18);
                    } else if (!destinationMarker) {
                        map.setView([lat, lng], 15);
                    }

                    // --- LOGIKA NAVIGASI & INSTRUKSI ---
                    if (routingControl && isNavigating && routeCoordinates.length > 0) {
                        let minDistance = Infinity;
                        let closestIndex = 0;
                        const currentPos = L.latLng(lat, lng);
                        
                        for(let i = 0; i < routeCoordinates.length; i++) {
                            const d = map.distance(currentPos, routeCoordinates[i]);
                            if(d < minDistance) {
                                minDistance = d;
                                closestIndex = i;
                            }
                        }

                        // Deteksi Keluar Jalur
                        if (minDistance > 50) {
                            offRouteCount++;
                            // Jika keliru jalan > 5 tik dan tidak sedang loading
                            if (offRouteCount >= 5 && !isRecalculating) { 
                                isRecalculating = true;
                                elTurnIcon.innerText = "🔄";
                                elInstruction.innerText = "Menghitung ulang rute...";
                                
                                // Bersihkan rute lama agar logic tidak tersangkut
                                routeInstructions = [];
                                spokenInstructionIndex = -1;
                                traversedLine.setLatLngs([]);
                                
                                routingControl.setWaypoints([
                                    L.latLng(lat, lng),
                                    destinationMarker.getLatLng()
                                ]);
                            }
                        } else if (!isRecalculating) {
                            offRouteCount = 0;

                            const passedPath = routeCoordinates.slice(0, closestIndex + 1);
                            traversedLine.setLatLngs(passedPath);
                            traversedLine.bringToFront(); 
                            userMarker.bringToFront(); 

                            // Hitung Sisa Jarak & ETA Akurat dari Array Koordinat
                            let remDist = 0;
                            if (closestIndex < routeCoordinates.length) {
                                remDist = map.distance(currentPos, routeCoordinates[closestIndex]);
                                for (let i = closestIndex; i < routeCoordinates.length - 1; i++) {
                                    remDist += map.distance(routeCoordinates[i], routeCoordinates[i+1]);
                                }
                            }

                            if (remDist > 0) {
                                elRemDist.innerText = `Sisa: ${(remDist / 1000).toFixed(1)} km`;
                                elRemDist.style.display = 'block';
                                
                                let safeSpeed = speedMps < 2 ? 8.33 : speedMps; 
                                let remTimeSec = remDist / safeSpeed;
                                let etaDate = new Date(Date.now() + remTimeSec * 1000);
                                elEta.innerText = `ETA: ${etaDate.getHours().toString().padStart(2, '0')}:${etaDate.getMinutes().toString().padStart(2, '0')}`;
                                elEta.style.display = 'block';
                            }

                            // Temukan Manuver Berikutnya
                            let nextInst = null;
                            let nextInstIndex = -1;
                            let distToManeuver = 0;

                            for (let i = 0; i < routeInstructions.length; i++) {
                                // OSRM index adalah titik koordinat saat manuver terjadi
                                if (routeInstructions[i].index > closestIndex) {
                                    nextInst = routeInstructions[i];
                                    distToManeuver = map.distance(currentPos, routeCoordinates[nextInst.index]);
                                    nextInstIndex = i;
                                    break;
                                }
                            }

                            if (nextInst) {
                                elTurnIcon.innerText = getDirectionEmoji(nextInst.modifier, nextInst.type);
                                elInstruction.innerText = `${nextInst.text} (${Math.round(distToManeuver)}m)`;

                                // Voice Nav: Trigger < 150m (diperlebar agar tidak terlewat)
                                if (distToManeuver < 150 && spokenInstructionIndex !== nextInstIndex) {
                                    speak(`Dalam ${Math.round(distToManeuver)} meter, ${nextInst.text}`);
                                    spokenInstructionIndex = nextInstIndex; 
                                }
                            } else {
                                let distToDest = map.distance(currentPos, destinationMarker.getLatLng());
                                if (distToDest < 50) {
                                    elTurnIcon.innerText = "🏁";
                                    elInstruction.innerText = "Tiba di tujuan";
                                    if (spokenInstructionIndex !== 9999) {
                                        speak("Anda telah tiba di lokasi tujuan.");
                                        spokenInstructionIndex = 9999;
                                    }
                                } else {
                                    elTurnIcon.innerText = "⬆️";
                                    elInstruction.innerText = "Ikuti jalan...";
                                }
                            }
                        }
                    }
                },
                (err) => console.error("GPS Error:", err),
                { enableHighAccuracy: true, maximumAge: 1000 }
            );
        }

        // --- PENCARIAN LOKASI ---
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value;
            if (query.length < 3) { searchResults.style.display = 'none'; return; }

            searchTimeout = setTimeout(() => {
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&countrycodes=id&limit=5`)
                .then(res => res.json())
                .then(data => {
                    searchResults.innerHTML = '';
                    if(data.length > 0) {
                        data.forEach(item => {
                            const li = document.createElement('li');
                            li.innerText = item.display_name;
                            li.onclick = () => selectDestination(item.lat, item.lon, item.display_name);
                            searchResults.appendChild(li);
                        });
                        searchResults.style.display = 'block';
                    }
                });
            }, 500);
        });

        // --- MEMILIH TUJUAN ---
        function selectDestination(lat, lng, name) {
            searchResults.style.display = 'none';
            searchInput.value = name.split(',')[0]; 
            elStreet.innerText = "Tujuan: " + name;

            if (destinationMarker) map.removeLayer(destinationMarker);
            destinationMarker = L.marker([lat, lng]).addTo(map);

            if (routingControl) map.removeControl(routingControl);

            routingControl = L.Routing.control({
                waypoints: [ L.latLng(userLat, userLng), L.latLng(lat, lng) ],
                router: L.Routing.osrmv1({ language: 'id', profile: 'driving' }),
                lineOptions: { styles: [{ color: '#00aaff', opacity: 0.8, weight: 6 }] },
                createMarker: function() { return null; }, 
                addWaypoints: false, 
                routeWhileDragging: false,
                show: false 
            }).addTo(map);

            routingControl.on('routesfound', function(e) {
                const routes = e.routes;
                const summary = routes[0].summary;
                
                routeCoordinates = routes[0].coordinates;
                routeInstructions = routes[0].instructions;
                offRouteCount = 0; 
                isRecalculating = false; // Flag reset setelah rute ditemukan
                spokenInstructionIndex = -1; // Reset memory voice
                traversedLine.setLatLngs([]); 
                
                maneuverMarkers.forEach(m => map.removeLayer(m));
                maneuverMarkers = [];

                routeInstructions.forEach((inst, idx) => {
                    if (inst.index && inst.text && idx > 0) {
                        const coord = routeCoordinates[inst.index];
                        const iconSymbol = getDirectionEmoji(inst.modifier, inst.type);
                        
                        const mIcon = L.divIcon({
                            className: '',
                            html: `<div class="maneuver-map-icon" style="width: 24px; height: 24px;">${iconSymbol}</div>`,
                            iconSize: [28, 28],
                            iconAnchor: [14, 14]
                        });
                        const marker = L.marker(coord, {icon: mIcon}).addTo(map);
                        maneuverMarkers.push(marker);
                    }
                });
                
                if (!isNavigating) {
                    map.fitBounds(L.latLngBounds([userLat, userLng], [lat, lng]).pad(0.2));
                    btnStart.style.display = 'block'; 
                    elTurnIcon.innerText = "📍";
                    elInstruction.innerText = `Total Jarak: ${(summary.totalDistance / 1000).toFixed(1)} km`;
                }
                
                btnCancel.style.display = 'block';
            });
        }

        // --- TOMBOL TEMA (Perbaikan URL HTTP) ---
        btnTheme.addEventListener('click', () => {
            const body = document.body;
            body.classList.toggle('light-mode');
            
            if (body.classList.contains('light-mode')) {
                btnTheme.innerText = '🌙';
                tileLayer.setUrl('http://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png');
            } else {
                btnTheme.innerText = '☀️';
                tileLayer.setUrl('http://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png');
            }
        });

        // --- TOMBOL START ---
        btnStart.addEventListener('click', () => {
            isNavigating = true;
            btnStart.style.display = 'none';
            searchInput.disabled = true; 
            spokenInstructionIndex = -1; 
            
            map.setView([userLat, userLng], 18);
            map.dragging.disable(); map.touchZoom.disable(); map.doubleClickZoom.disable();
            map.scrollWheelZoom.disable(); map.boxZoom.disable(); map.keyboard.disable();

            elTurnIcon.innerText = "⬆️";
            elInstruction.innerText = "Mulai ikuti rute...";
            speak("Navigasi dimulai.");
        });

        // --- TOMBOL BATAL ---
        btnCancel.addEventListener('click', () => {
            isNavigating = false;
            isRecalculating = false;
            btnStart.style.display = 'none';
            btnCancel.style.display = 'none';
            searchInput.disabled = false;
            searchInput.value = '';
            
            elStreet.innerText = "Posisi tidak diketahui";
            elTurnIcon.innerText = "📍";
            elInstruction.innerText = "Menunggu tujuan...";
            elRemDist.style.display = 'none';
            elEta.style.display = 'none';

            routeCoordinates = [];
            routeInstructions = [];
            offRouteCount = 0;
            spokenInstructionIndex = -1;
            traversedLine.setLatLngs([]);
            
            maneuverMarkers.forEach(m => map.removeLayer(m));
            maneuverMarkers = [];

            if (routingControl) { map.removeControl(routingControl); routingControl = null; }
            if (destinationMarker) { map.removeLayer(destinationMarker); destinationMarker = null; }

            map.dragging.enable(); map.touchZoom.enable(); map.doubleClickZoom.enable();
            map.scrollWheelZoom.enable(); map.boxZoom.enable(); map.keyboard.enable();

            map.setView([userLat, userLng], 15);
        });

        // --- WAKE LOCK API ---
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); }
            } catch (err) { console.error(`${err.name}, ${err.message}`); }
        }

        // --- TOMBOL HUD ---
        btnHud.addEventListener('click', async () => {
            const body = document.body;
            
            if (!document.fullscreenElement) {
                try { await document.documentElement.requestFullscreen(); } 
                catch(err) { console.log("Fullscreen ditolak:", err); }
            } else { document.exitFullscreen(); }

            if (!body.classList.contains('hud-mode')) {
                requestWakeLock();
            } else if (wakeLock !== null) {
                wakeLock.release(); wakeLock = null;
            }

            body.classList.toggle('hud-mode');

            if (body.classList.contains('hud-mode')) {
                btnHud.innerText = "NORMAL";
                btnHud.style.background = "#6c757d";
            } else {
                btnHud.innerText = "HUD";
                btnHud.style.background = "#dc3545";
            }

            setTimeout(() => { map.invalidateSize(); }, 500);
        });

        window.addEventListener('resize', () => { setTimeout(() => { map.invalidateSize(); }, 500); });
    </script>
</body>
</html>
